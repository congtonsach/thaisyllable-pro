<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThaiSyllable Pro – THÁI DỄ HỌC</title>
  <meta name="description" content="Tra cứu quy tắc âm tiết tiếng Thái – phân tích Onset · Nucleus · Coda · Tone trực quan." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS (CDN, no build needed) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    /* ── Base reset & tokens ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-onset:   #4F46E5;
      --color-nucleus: #0891B2;
      --color-coda:    #D97706;
      --color-tone:    #7C3AED;
      --color-bg:      #F0F4FF;
      --color-surface: #FFFFFF;
      --color-text:    #1A1A2E;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }

    /* ── Card hover (mobile: disable hover effects) ── */
    @media (hover: none) {
      .vocab-card { transition: none !important; }
    }

    /* ── Mobile: show menu toggle ── */
    @media (max-width: 767px) {
      #menu-toggle { display: flex !important; }
      #sidebar-wrapper {
        position: fixed !important;
        top: 0; left: 0;
        height: 100%; width: 260px;
        background: #fff;
        z-index: 50;
        box-shadow: 4px 0 20px rgba(0,0,0,.1);
        transform: translateX(-100%);
        transition: transform .25s ease;
        overflow-y: auto;
      }
    }

    /* ── Chip animation on reveal ── */
    .chip {
      animation: chipIn .2s ease both;
    }
    @keyframes chipIn {
      from { opacity:0; transform: translateY(6px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── Quiz option feedback shake ── */
    .quiz-option.wrong {
      animation: shake .3s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-4px); }
      75%      { transform: translateX(4px); }
    }

    /* ── Page header top bar ── */
    #app-topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      background: rgba(240,244,255,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #E2E8F0;
    }
  </style>
</head>
<body>

  <!-- ══ TOP BAR ══ -->
  <div id="app-topbar" style="padding:12px 20px;">
    <div id="app-header">
      <!-- Rendered by app.js → renderHeader() -->
    </div>
  </div>

  <!-- ══ BODY LAYOUT ══ -->
  <div style="display:flex; gap:0; max-width:1280px; margin:0 auto; position:relative; min-height:calc(100vh - 80px);">

    <!-- Sidebar wrapper (handles mobile sliding) -->
    <div id="sidebar-wrapper" style="
      width:220px; flex-shrink:0; padding:8px 0;
      background:#fff; border-right:1px solid #EEF2F7;
      position:sticky; top:80px; height:calc(100vh - 80px); overflow-y:auto;
    ">
      <div id="app-sidebar">
        <!-- Rendered by app.js → renderSidebar() -->
      </div>
    </div>

    <!-- Mobile overlay -->
    <div id="mobile-overlay" style="
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.4);
      z-index:40; backdrop-filter:blur(2px);
    "></div>

    <!-- Main content -->
    <main id="app-main" style="flex:1; padding:20px; min-width:0;">
      <!-- Rendered by app.js → renderCardGrid() -->
    </main>

  </div>

  <!-- ══ FOOTER ══ -->
  <footer style="
    text-align:center; padding:24px; font-size:12px; color:#94A3B8;
    border-top:1px solid #EEF2F7; background:#fff; margin-top:40px;
  ">
    <span style="font-family:'Sarabun',sans-serif; font-size:14px;">🇹🇭</span>
    <strong style="color:#4F46E5;">THÁI DỄ HỌC</strong> · ThaiSyllable Pro ·
    Học tiếng Thái qua cấu trúc âm tiết
    <span style="margin-left:8px; opacity:0.5;">v1.0</span>
  </footer>

  <!-- ══ APP ENTRY ══ -->
  <script type="module" src="./src/app.js"></script>

</body>
</html>
